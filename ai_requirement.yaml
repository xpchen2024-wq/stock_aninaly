      date: 2026-06-16
      changes:
        - 初始版本
  objective: >
    构建一个基于多智能体架构的AI股票分析系统，为个人投资者提供机构级别的
    深度分析能力。核心特色包括：多源数据自动切换、AI大模型趋势分析、机构研报
    分析、Serenity瓶颈猎头分析法、多模型AI接入配置管理，以及由多角色Agent团队协作的完整交易决策管线。
  target_users:
    - type: 个人投资者
      description: 有一定股票投资经验，需要专业级分析工具的散户投资者
    - type: 量化交易者
      description: 需要数据源和分析管线的程序化交易者
    - type: 投资研究员
      description: 需要快速扫描大量股票和研报的半专业研究者

# -- Data Sources --------------------------------------------------------------
data_sources:
  priority: P0
  description: 股票/金融数据获取是所有分析的基础，必须可靠且具备自动故障转移
  sources:
    - name: 腾讯财经
      source_type: api
      priority_rank: 1
      reliability: high
      data_types:
        - kline
        - realtime_quote
        - index
        - fundamental
      fallback_group: cn_stock
    - name: 新浪财经
      source_type: api
      priority_rank: 2
      reliability: high
      data_types:
        - kline
        - realtime_quote
        - news
      fallback_group: cn_stock
    - name: 同花顺
      source_type: api
      priority_rank: 3
      reliability: medium
      data_types:
        - kline
        - realtime_quote
        - fundamental
      fallback_group: cn_stock
    - name: AkShare
      source_type: python_library
      priority_rank: 4
      reliability: medium
      notes: 开源Python库，封装多个中国金融数据源，可能被反爬
      data_types:
        - kline
        - fundamental
        - news
        - macro
      fallback_group: cn_stock
    - name: Tushare
      source_type: python_library
      priority_rank: 5
      reliability: medium
      notes: 需要API Token，有积分限制
      data_types:
        - kline
        - fundamental
        - reference_data
      fallback_group: cn_stock
    - name: Yahoo Finance
      source_type: api
      priority_rank: 6
      reliability: medium
      notes: 国际股票数据，中国A股数据可能不全
      data_types:
        - kline
        - realtime_quote
        - fundamental
      fallback_group: global_stock

  # Core requirements
  requirements:
    - id: DS-001
      description: 系统必须自动检测数据源的可用性，按优先级从高到低尝试
      acceptance: 当一个数据源请求失败时，系统在小于2秒内自动切换到下一个可用源
    - id: DS-002
      description: 数据时效性：行情数据延迟不超过3秒，新闻资讯不超过3天
      acceptance: 实时行情延迟小于3秒，热点新闻发布时间小于72小时
    - id: DS-003
      description: 支持多种数据类型：K线(日/周/月/分钟)、实时报价、财务数据、新闻、板块数据
      acceptance: 每种数据至少有两个数据源支持
    - id: DS-004
      description: 数据一致性校验：跨源数据对比，差异超过阈值时告警
      acceptance: 同一股票同一时间段的K线数据差异大于1%时记录并告警
    - id: DS-005
      description: >
        数据按需获取策略：不本地存储全部5000+只股票的历史K线数据。
        分析时按需从网上数据源实时拉取，仅对用户关注列表中的股票
        本地缓存最近90天日K线（用于AI趋势分析和技术指标计算）。实时行情缓存60秒。
      acceptance:
        - 非关注股票分析时实时从数据源获取，响应延迟 <5s
        - 关注列表股票 K线从本地缓存读取，响应 <500ms
        - 数据库存储量 <500MB（vs 全量存储 ~50GB）

# -- Real-time Hot Topic Tracking ----------------------------------------------
hot_topic_tracking:
  priority: P0
  description: 实时获取金融资讯并提炼市场热点主题
  requirements:
    - id: HT-001
      description: 自动抓取权威新闻源(财联社、华尔街见闻、新浪财经、东方财富等)的金融资讯
      acceptance: 覆盖至少5个权威金融新闻源
    - id: HT-002
      description: 使用NLP从新闻中提取热点主题、热度和关联股票
      acceptance: 热点识别准确率大于80%，关联股票正确率大于70%
    - id: HT-003
      description: 热点热度量化：基于新闻数量、传播速度、影响范围计算热度指标
      acceptance: 每15分钟更新一次热点排行榜
    - id: HT-004
      description: 资讯时效不超过3天，过期信息自动归档
      acceptance: 前端展示的资讯均在72小时内

# -- AI Trend Analysis (via LLM) ------------------------------------------------
ai_trend_analysis:
  priority: P0
  description: >
    通过 AI 大模型分析技术指标和K线形态来判断短期股价趋势，
    不自行训练传统机器学习模型（LSTM/GRU/Transformer等）。
    将K线数据、技术指标作为上下文传入大模型，由AI综合分析并输出趋势判断。
  requirements:
    - id: TA-001
      description: >
        AI 趋势分析：将股票K线数据（日K/周K/分钟K）、技术指标
        （MACD、RSI、KDJ、布林带、均线系统）、成交量等数据作为上下文，
        通过 AI 大模型分析短期趋势方向（看涨/看跌/震荡）及关键点位
      acceptance: AI 输出包含趋势方向判断、支撑/阻力位、技术形态识别
    - id: TA-002
      description: 支持多种时间粒度分析：5分钟/15分钟/30分钟/1小时/1天
      acceptance: 至少支持5种时间粒度的趋势分析
    - id: TA-003
      description: >
        AI 趋势分析结果附带置信度评估（高/中/低）和风险提示，
        说明判断依据（如"MACD金叉 + 放量突破均线"）
      acceptance: 每次分析附带置信度评级和判断依据
    - id: TA-004
      description: >
        支持多时间框架交叉验证：同时分析日线、周线、月线，
        AI 判断多周期是否共振，给出综合趋势评分
      acceptance: 多周期分析结果包含共振/背离判断
    - id: TA-005
      description: >
        AI 趋势分析通过 AI 模型网关调用，可配置使用不同模型
        （如趋势分析用 deepseek-chat 降低成本，深度分析用 o1）
      acceptance: 趋势分析场景可独立配置 AI 模型

# -- Institutional Research Analysis -------------------------------------------
institutional_research:
  priority: P1
  description: 自动获取大机构研报，分析推荐行业和股票，并进行独立验证
  requirements:
    - id: IR-001
      description: 自动获取主流券商(中金、中信、华泰、国泰君安等)的研报
      acceptance: 覆盖至少10家主流券商的研报
    - id: IR-002
      description: NLP提取研报核心观点、推荐股票、目标价、评级
      acceptance: 结构化提取准确率大于85%
    - id: IR-003
      description: >
        不能直接相信研报结论，需根据股票/行业实际走势进行交叉验证，
        过滤掉与市场实际走势不符的推荐
      acceptance: 对每个推荐股票生成独立分析报告，对比研报观点与实际数据
    - id: IR-004
      description: >
        过滤出评分最高的高价值标的（瓶颈/卡脖子概念），并给出逻辑说明
      acceptance: 从研报推荐池中筛选Top 5高价值标的并说明筛选逻辑
    - id: IR-005
      description: 对推荐行业/股票进行持续跟踪和趋势分析
      acceptance: 覆盖标的每日自动更新跟踪报告

# -- Serenity Deep Analysis ----------------------------------------------------
serenity_analysis:
  priority: P0
  description: 基于Serenity瓶颈猎头投研框架的深度股票分析
  reference_file: Serenity分析法.md
  requirements:
    - id: SA-001
      description: 输入股票代码或名称，启动完整的Serenity 5步分析流程
      steps:
        - step: 1
          name: 供应链BOM剥洋葱
          description: 将市场热点穿透至少3层，从终端需求到中游集成到底层材料/零部件
        - step: 2
          name: 卡脖子卡点与稀缺性审计
          description: 盘点供应商数量、技术门槛、扩产周期
        - step: 3
          name: 逆向对抗性证伪测试
          description: 做空机构视角审查：专利高墙/重资产陷阱/概念偷换
        - step: 4
          name: 筹码结构与持股成本测算
          description: 国家队底/机构成本区/量化游资情绪区
        - step: 5
          name: 硬核幸存者执行矩阵
          description: 左侧潜伏点参数 + 右侧加仓催化剂
      acceptance: 5步分析自动串联输出完整分析报告
    - id: SA-002
      description: 输出格式必须结构化：Markdown标题 + 表格 + 分级列表
      acceptance: 每份报告包含至少1个对比表格和供应链监测哨位
    - id: SA-003
      description: >
        瓶颈筛选三条件：
        1) 极端稀缺性 - 核心玩家少于5家，高度寡头垄断
        2) 高验证壁垒 - 下游验证导入周期大于12个月
        3) 技术架构颠覆 - 行业迎来刚性技术更迭，该组件是新架构唯一解
      acceptance: 每个推荐标的必须满足至少2个条件并明确标注

# -- Multi-Agent Architecture (Core Feature) -----------------------------------
multi_agent_architecture:
  priority: P0
  description: 将复杂交易任务分解为多个专业AI Agent角色协作完成

  # Analyst Team
  analyst_team:
    description: 负责数据分析和信号生成
    members:
      - id: AGENT-ANL-01
        name: 基本面分析师
        role: 评估公司财务和绩效指标，识别内在价值及危险信号
        inputs:
          - 财务报表
          - 估值指标
          - 行业对比数据
        outputs:
          - 基本面评分
          - 危险信号列表
          - 内在价值估算
      - id: AGENT-ANL-02
        name: 情绪分析师
        role: 聚合新闻标题、StockTwits、Reddit讨论，生成单一情绪读数
        inputs:
          - 新闻标题
          - 社交媒体帖子
          - 社区讨论
        outputs:
          - 市场情绪评分
          - 情绪趋势图
      - id: AGENT-ANL-03
        name: 新闻分析师
        role: 监控全球新闻和宏观经济指标，解读事件影响
        inputs:
          - 全球金融新闻
          - 宏观经济数据
          - 政策公告
        outputs:
          - 事件影响评估
          - 宏观评分
      - id: AGENT-ANL-04
        name: 技术分析师
        role: 利用技术指标(MACD, RSI等)检测交易模式并预测价格走势
        inputs:
          - K线数据
          - 成交量数据
          - 技术指标参数
        outputs:
          - 技术分析信号
          - 支撑/阻力位
          - 形态识别

  # Research Team
  research_team:
    description: 对分析师团队的洞察进行批判性评估，看涨和看衰辩论
    debate_format: structured_debate
    members:
      - id: AGENT-RES-01
        name: 看涨研究员(Bullish)
        role: 从积极面评估投资机会，寻找上涨催化剂
      - id: AGENT-RES-02
        name: 看衰研究员(Bearish)
        role: 从风险面寻找逻辑漏洞，提出质疑和风险点
    process:
      - 独立分析分析师团队报告
      - 结构化学术辩论：看涨 vs 看衰
      - 输出平衡报告：潜在收益 vs 固有风险

  # Trading Agent
  trading_agent:
    id: AGENT-TRD-01
    name: 交易代理
    role: 综合分析师与研究员报告，做出交易决策
    responsibilities:
      - 确定交易时机和规模
      - 制定买入/卖出/持有建议
      - 设定止盈止损参数
    inputs:
      - 分析师团队报告
      - 研究团队辩论结论
    outputs:
      - 交易提案
      - 仓位建议
      - 订单参数

  # Risk Management & Portfolio Manager
  risk_and_portfolio:
    members:
      - id: AGENT-RSK-01
        name: 风险管理团队
        role: 评估市场波动性、流动性及其他风险因素，持续评估投资组合风险
        responsibilities:
          - 计算VaR(风险价值)和CVaR
          - 评估持仓集中度风险
          - 压力测试：极端市场情景模拟
          - 调整交易策略参数
      - id: AGENT-PM-01
        name: 投资组合经理
        role: 审批/拒绝交易提案，给出投资建议
        decision_power: final_approval
        responsibilities:
          - 审核交易提案及其风险评估
          - 分配投资金额和比例
          - 批准后给出投资逻辑说明

  # Agent Collaboration Workflow
  workflow:
    phases:
      - phase: 1
        name: 数据采集与信号生成
        actors:
          - 基本面分析师
          - 情绪分析师
          - 新闻分析师
          - 技术分析师
        description: 各分析师并行工作，从各自维度生成分析信号
      - phase: 2
        name: 洞察综合与辩论
        actors:
          - 看涨研究员
          - 看衰研究员
        description: 研究团队审阅所有分析师报告，展开结构性辩论
        depends_on:
          - phase_1
      - phase: 3
        name: 交易决策生成
        actors:
          - 交易代理
        description: 综合研究成果生成具体交易提案
        depends_on:
          - phase_2
      - phase: 4
        name: 风险评估与审批
        actors:
          - 风险管理团队
          - 投资组合经理
        description: 风险评估和最终审批/拒绝
        depends_on:
          - phase_3
      - phase: 5
        name: 执行与监控
        actors:
          - 交易代理
          - 风险管理团队
        description: 执行已批准交易，持续监控持仓风险
        depends_on:
          - phase_4

# -- AI Model Access Configuration Management ----------------------------------
ai_model_config:
  priority: P0
  description: >
    在 UI 界面提供 AI 大模型接入的配置管理功能，支持多种主流大模型
    平台的接入与切换，用户可自由配置 API Key、Base URL、模型名称等参数，
    系统根据配置动态路由到指定模型。
  requirements:
    - id: AI-001
      description: >
        支持在 UI 界面配置多个 AI 大模型接入，包括但不限于：
        OpenAI (GPT-4o / GPT-4o-mini / o1 等)、
        OpenCodeZen、
        OpenRouter (聚合网关，可接入 Claude / Gemini / Llama 等)、
        DeepSeek (DeepSeek-V3 / DeepSeek-R1 等)
      acceptance: UI 表单可添加/编辑/删除模型配置，至少支持 4 类平台
    - id: AI-002
      description: >
        每个模型配置项包括：
        - 平台类型（下拉选择：OpenAI / OpenCodeZen / OpenRouter / DeepSeek / 自定义）
        - API Base URL（支持自定义代理地址）
        - API Key（AES-256 加密存储）
        - 模型名称（如 gpt-4o, deepseek-chat）
        - 最大 Token 数
        - 温度参数 (Temperature)
        - 是否设为默认模型
        - 启用/禁用开关
      acceptance: 所有配置项可在 UI 完成填写并持久化存储
    - id: AI-003
      description: 支持配置多个模型并存，Agent 可根据任务类型自动路由到不同模型
      acceptance: 可配置多个模型，不同 Agent 角色可使用不同模型
    - id: AI-004
      description: API Key 必须 AES-256 加密存储，前端展示脱敏（如 sk-****xxxx）
      acceptance: 数据库存储为密文，UI 回显为脱敏格式
    - id: AI-005
      description: 支持连接测试功能，配置完成后可一键验证模型可用性
      acceptance: 点击「测试连接」返回模型响应延迟和可用状态
    - id: AI-006
      description: 模型切换实时生效，无需重启服务
      acceptance: 切换默认模型后，下一次 Agent 调用使用新模型
    - id: AI-007
      description: >
        支持自定义兼容 OpenAI API 格式的第三方模型接入
        （通过 OpenRouter 或自定义 Base URL）
      acceptance: 填写自定义 Base URL + API Key 即可接入任意兼容 OpenAI 格式的模型

  supported_platforms:
    - name: OpenAI
      models:
        - gpt-4o
        - gpt-4o-mini
        - o1
        - o3-mini
      auth_type: api_key
      base_url: https://api.openai.com/v1
    - name: OpenCodeZen
      models:
        - opencodezen-v1
      auth_type: api_key
      base_url: user_configurable
    - name: OpenRouter
      models:
        - openai/gpt-4o
        - anthropic/claude-sonnet-4
        - google/gemini-2.5-pro
        - meta-llama/llama-4-maverick
      auth_type: api_key
      base_url: https://openrouter.ai/api/v1
    - name: DeepSeek
      models:
        - deepseek-chat
        - deepseek-reasoner
      auth_type: api_key
      base_url: https://api.deepseek.com/v1
    - name: Custom
      models:
        - user_defined
      auth_type: api_key
      base_url: user_configurable
      notes: 兼容 OpenAI API 格式的任意第三方模型

# -- AI Analysis Conclusion Generation -----------------------------------------
ai_analysis_conclusion:
  priority: P0
  description: >
    在数据采集完成（或采集过程中）后，由 AI 大模型对收集到的数据进行综合
    分析，生成结构化的详细分析结论。覆盖热点追踪、AI趋势分析、研报分析、
    Serenity分析、多Agent决策等所有分析场景，确保每个分析环节都有
    AI 生成的文字结论支撑。
  requirements:
    - id: AC-001
      description: >
        实时热点追踪分析：采集新闻资讯后，AI 自动生成热点事件摘要、
        影响分析、关联标的推荐及操作建议
      acceptance: 每个热点事件附带 200-500 字 AI 分析结论
    - id: AC-002
      description: >
        AI 趋势分析结论：AI 综合K线形态、技术指标、量价关系等数据，
        生成趋势判断、关键点位、技术形态解读及风险提示
      acceptance: 趋势分析附带 AI 生成的自然语言解读，非技术用户可理解
    - id: AC-003
      description: >
        研报分析结论：AI 对多份研报进行交叉对比后，生成综合结论报告，
        包括：共识观点、分歧点、独立判断、推荐理由
      acceptance: 每份综合研报分析附带 AI 结论，包含至少 3 个分析维度
    - id: AC-004
      description: >
        Serenity 分析结论：5 步分析完成后，AI 生成最终投资建议报告，
        包括：核心竞争力总结、风险清单、投资时间窗口、仓位建议
      acceptance: Serenity 分析报告末尾包含 AI 生成的执行建议
    - id: AC-005
      description: >
        多 Agent 决策结论：交易代理生成交易提案后，AI 生成决策理由
        说明；投资组合经理审批/拒绝后，AI 生成审批意见说明
      acceptance: 每笔交易决策附带 AI 生成的逻辑说明（150-300字）
    - id: AC-006
      description: >
        AI 结论输出格式：结构化 Markdown，包含标题层级、要点列表、
        数据表格、风险标注（🔴🟡🟢）
      acceptance: 结论输出统一为结构化 Markdown 格式，前端可渲染
    - id: AC-007
      description: >
        AI 结论生成使用的模型可通过 AI 模型配置管理（AI-001~AI-007）
        灵活指定，不同分析场景可配置不同模型
      acceptance: 热点分析/AI趋势分析/研报结论/Serenity结论可分别配置模型
    - id: AC-008
      description: >
        大V观点聚合分析：AI 对抖音+微博 Top 20 财经大V 48h 观点进行聚合分析，
        生成共识/分歧摘要、热议标的列表及交叉对比报告
      acceptance: 每日自动生成大V共识摘要，热议标的自动与系统内分析结果交叉对比

# -- KOL Opinion Aggregation (抖音 + 微博) --------------------------------------
kol_opinion_aggregation:
  priority: P1
  description: >
    自动获取抖音和微博平台前 20 名财经大V近 2 天（48 小时）内发布的观点和推荐，
    在资讯页面统一展示。AI 自动提取多空方向、推荐标的和话题标签，
    支持按平台/热度/时间筛选排序。
  platforms:
    - name: 抖音
      kol_count: 20
      content_types:
        - 短视频口播观点
        - 图文分析
      update_interval: 30min
    - name: 微博
      kol_count: 20
      content_types:
        - 文字观点
        - 长文分析
        - 转发评论
      update_interval: 30min
  kol_selection_criteria:
    min_followers: 500000
    certification_required: true
    active_7days: true
    rank_update_interval: weekly
  requirements:
    - id: KV-001
      description: >
        自动采集抖音和微博平台各前 20 名财经大V近 48 小时内发布的内容，
        包括观点原文、点赞/评论/转发数、发布时间
      acceptance:
        - 覆盖抖音 + 微博各至少 20 名财经大V
        - 每 30 分钟自动更新一次
        - 采集成功率达 95% 以上
    - id: KV-002
      description: >
        每条观点标注来源平台、博主身份（昵称 + 认证标签）、发布时间、
        话题标签和话题热度
      acceptance:
        - 每条观点卡片包含完整元信息
        - 话题热度基于点赞/评论/转发综合计算
        - 博主认证标签正确显示
    - id: KV-003
      description: >
        AI 自动提取观点中的多空方向（看多/看空/中性）和推荐标的
        （股票代码 + 板块），生成不超过 150 字的观点摘要
      acceptance:
        - 多空方向识别准确率 > 75%
        - 推荐标的提取准确率 > 70%
        - 摘要长度 ≤ 150 字
    - id: KV-004
      description: >
        在资讯页面以双列卡片展示抖音和微博大V观点，支持按平台筛选、
        按热度排序、按发布时间排序，支持点击展开完整内容
      acceptance:
        - 默认展示 48 小时内观点
        - 支持平台筛选和排序切换
        - 卡片点击可展开详情
    - id: KV-005
      description: >
        AI 对 Top 20 大V观点进行聚合分析，生成每日共识/分歧摘要；
        热议标的（多个大V同时提及）自动标记并与系统内趋势分析、研报结论交叉对比
      acceptance:
        - 每日自动生成共识摘要
        - 3 位以上大V同时提及的标的自动标记为热议
        - 交叉对比结果在前端可查看
  heat_formula: >
    热度 = 0.25 × ln(点赞+1) + 0.30 × ln(评论+1) + 0.20 × ln(转发+1)
    + 0.25 × 大V影响力系数
  data_retention:
    raw_opinions: 30天
    ai_summaries: 长期
    frontend_display_window: 48小时
    heat_cache_ttl: 30分钟

# -- User Watchlist Management -------------------------------------------------
user_watchlist:
  priority: P0
  description: >
    用户可创建和维护个人股票关注列表，关注列表中的股票享受本地缓存加速
    （K线缓存90天，读取 <500ms），支持分组管理和快速分析入口。
  requirements:
    - id: WL-001
      description: 支持按股票代码或名称搜索并添加/移除到关注列表
      acceptance: 搜索响应 <1s，支持模糊匹配
    - id: WL-002
      description: 支持自定义分组管理（如"科技"、"消费"、"自选"等标签）
      acceptance: 可创建/编辑/删除分组，股票可归属多个分组
    - id: WL-003
      description: 关注列表内一键启动深度分析（Serenity / AI趋势分析）
      acceptance: 点击关注列表中股票可直接跳转分析页面
    - id: WL-004
      description: 关注列表股票K线本地缓存90天，读取 <500ms
      acceptance: 首次添加后自动触发历史数据缓存
    - id: WL-005
      description: 支持批量导入/导出关注列表（CSV/JSON格式）
      acceptance: 导入支持格式校验，导出包含股票代码+名称+分组

# -- Non-Functional Requirements -----------------------------------------------
non_functional:
  - id: NF-001
    category: 性能
    description: 任一Agent的分析响应时间不超过30秒
    target: p95小于30s
  - id: NF-002
    category: 性能
    description: 实时行情刷新频率：最短5秒一次
    target: 5s-60s可配置
  - id: NF-003
    category: 可靠性
    description: 系统可用性大于99.5%（交易时段）
    target: 99.5% uptime during market hours
  - id: NF-004
    category: 可靠性
    description: 数据源故障时自动切换，用户无感知
    target: failover小于2s
  - id: NF-005
    category: 性能
    description: 关注列表K线从本地缓存读取延迟
    target: 小于500ms
  - id: NF-006
    category: 性能
    description: 非关注股票首次分析时从数据源实时拉取延迟
    target: 小于5s
  - id: NF-007
    category: 可扩展性
    description: Agent角色可插拔，新增角色不影响现有流程
    target: 新增一个Agent需要小于1人天开发量
  - id: NF-008
    category: 可扩展性
    description: 数据源可扩展，适配器模式添加新源
    target: 新增一个数据源需要小于0.5人天
  - id: NF-009
    category: 可扩展性
    description: AI模型平台可扩展，通过Custom Adapter零代码接入OpenAI兼容模型
    target: 填写Base URL + API Key即可接入
  - id: NF-010
    category: 安全性
    description: 用户API Key/Token本地加密存储
    target: AES-256加密存储
  - id: NF-011
    category: 安全性
    description: 前端API Key展示脱敏处理
    target: 格式如 sk-****xxxx
  - id: NF-012
    category: 安全性
    description: 用户认证与授权
    target: JWT 令牌认证
  - id: NF-013
    category: 可维护性
    description: 所有Agent间通信通过结构化消息协议（非自然语言）
    target: 消息格式定义在 shared/schemas/ 目录下
  - id: NF-014
    category: 可维护性
    description: 系统可观测性：指标采集与可视化
    target: Prometheus + Grafana 监控
  - id: NF-015
    category: 可维护性
    description: 日志集中管理与查询
    target: 结构化日志，支持按 correlation_id 追踪完整调用链

# -- Recommended Tech Stack ----------------------------------------------------
tech_stack:
  recommended:
    language: Python 3.11+
    agent_framework:
      - LangGraph
      - LangChain
      - AutoGen
    model_gateway:
      - LiteLLM (多模型统一网关，含AI趋势分析调用)
      - OpenAI Python SDK
    data_pipeline:
      - Apache Kafka / RabbitMQ (事件驱动)
      - Pandas
      - Polars
    technical_indicators:
      - TA-Lib (技术指标计算：MACD/RSI/布林带等)
    vector_db:
      - ChromaDB
      - FAISS
    storage:
      relational: PostgreSQL (关注列表K线 + 业务数据)
      cache: Redis (实时行情 + 配置热缓存)
      note: 不存储全量历史K线，按需从数据源拉取
    api: FastAPI
    frontend:
      - React / Vue.js
      - Streamlit (原型)
    data_libs:
      - akshare
      - tushare
      - yfinance
      - open-stock-data

# -- Data Flow (Text Description) ----------------------------------------------
data_flow: |
  外部数据源
      |
      v
  [数据适配器层(故障转移)]
      |
      v
  [数据统一缓存(Redis)]
      |
      v
  [Agent消息队列 (Kafka/RabbitMQ)]
      |
      +---> 基本面分析Agent
      +---> 情绪分析Agent
      +---> 新闻分析Agent
      +---> 技术分析Agent
      |
      v
  [结构化学术辩论 (看涨研究员 vs 看跌研究员)]
      |
      v
  [交易提案Agent]
      |
      v
  [风险评估Agent] --> [投资组合经理(最终审批)]
      |
      v
  [执行 & 持续监控]

# -- Dependency Graph ----------------------------------------------------------
dependencies:
  # Level 0 (Infrastructure)
  - id: DEP-001
    from: 所有功能
    to: 多源数据适配器
    description: 所有分析功能依赖数据源
  - id: DEP-010
    from: 所有AI分析功能
    to: AI模型配置管理
    description: 所有Agent和AI分析功能依赖模型配置

  # Level 1 (Data Services)
  - id: DEP-002
    from: 实时热点追踪
    to: 多源数据适配器
  - id: DEP-003
    from: AI趋势分析
    to: 多源数据适配器
  - id: DEP-004
    from: 机构研报分析
    to: 多源数据适配器
  - id: DEP-005
    from: Serenity分析
    to: 多源数据适配器

  # Level 1.5 (AI Analysis Layer)
  - id: DEP-011
    from: AI分析结论生成
    to: 实时热点追踪
    description: 热点数据 → AI结论
  - id: DEP-012
    from: AI分析结论生成
    to: AI趋势分析
    description: 趋势分析结果 → AI解读
  - id: DEP-013
    from: AI分析结论生成
    to: 机构研报分析
    description: 研报数据 → AI综合结论
  - id: DEP-014
    from: AI分析结论生成
    to: Serenity分析
    description: Serenity 5步结果 → AI投资建议
  - id: DEP-015
    from: AI分析结论生成
    to: 交易代理
    description: 交易提案 → AI决策理由

  # Level 1.5 (KOL Opinion Layer)
  - id: DEP-016
    from: 财经大V观点聚合
    to: 多源数据适配器
    description: 社交媒体数据 → 数据接入层
  - id: DEP-017
    from: AI分析结论生成
    to: 财经大V观点聚合
    description: 大V观点 → AI共识/分歧摘要 (AC-008)

  # Level 2 (Agent Layer)
  - id: DEP-006
    from: 研究辩论团队
    to: 分析师团队(4个Agent)
  - id: DEP-007
    from: 交易代理
    to: 研究辩论团队

  # Level 3 (Risk Layer)
  - id: DEP-008
    from: 风险管理团队
    to: 交易代理
  - id: DEP-009
    from: 投资组合经理
    to: 风险管理团队

# -- Priority Matrix -----------------------------------------------------------
priority_matrix:
  p0_must_have:
    - DS-001 多源数据故障转移
    - DS-002 数据时效性保障
    - DS-005 数据按需获取策略
    - HT-001 到 HT-004 实时热点追踪
    - SA-001 到 SA-003 Serenity深度分析
    - TA-001 到 TA-005 AI趋势分析
    - WL-001 到 WL-005 用户关注列表管理
    - AGENT-ANL-01 到 AGENT-ANL-04 分析师团队
    - AGENT-RES-01 和 AGENT-RES-02 研究辩论团队
    - AGENT-TRD-01 交易代理
    - AGENT-RSK-01 和 AGENT-PM-01 风险管理与审批
    - AI-001 到 AI-007 AI模型接入配置管理
    - AC-001 到 AC-007 AI分析结论生成
    - AC-008 大V观点聚合AI分析
    - NF-001 到 NF-015 非功能需求

  p1_important:
    - IR-001 到 IR-005 机构研报分析
    - KV-001 到 KV-005 财经大V观点聚合

  p2_nice_to_have:
    - 前端Dashboard实时可视化
    - 微信/飞书通知集成
    - 回测引擎历史交易模拟
    - 模拟交易(Paper Trading)
